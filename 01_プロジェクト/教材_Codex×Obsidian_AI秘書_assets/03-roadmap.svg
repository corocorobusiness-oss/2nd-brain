    <circle cx="560" cy="450" r="54" fill="#ffffff" stroke="#14b8a6" stroke-width="6"/>
    <text x="560" y="462" font-size="30" font-weight="700" text-anchor="middle" fill="#0f766e">2</text>
    <text x="560" y="560" font-size="25" font-weight="700" text-anchor="middle" fill="#1e293b">AGENTS</text>
