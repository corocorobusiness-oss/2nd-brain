<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#f8fafc"/>
  <text x="800" y="80" font-family="Hiragino Sans, Yu Gothic, sans-serif" font-size="54" font-weight="700" text-anchor="middle" fill="#111827">7日で作る 自分専用AI秘書ロードマップ</text>
  <line x1="180" y1="450" x2="1420" y2="450" stroke="#cbd5e1" stroke-width="10" stroke-linecap="round"/>
