<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f4f6f2">
  <title>経営ダッシュボード</title>
  <style>
    :root{--bg:#f4f6f2;--card:#fff;--ink:#18201d;--muted:#6d7771;--line:#dce2dc;--green:#176b4d;--green2:#dff2e8;--amber:#956516;--amber2:#fff0cc;--red:#a83a36;--red2:#fde7e5;--blue:#205f92;--blue2:#e5f1fa;--shadow:0 12px 36px rgba(22,43,33,.07)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;line-height:1.55} button{font:inherit}
    .shell{max-width:1180px;margin:auto;padding:30px 22px 80px}.top{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:22px}.eyebrow{font-size:12px;font-weight:800;letter-spacing:.13em;color:var(--green);text-transform:uppercase}.top h1{font-size:clamp(26px,4vw,42px);line-height:1.1;margin:4px 0}.asof{color:var(--muted);font-size:13px;text-align:right}
    .warnings{display:grid;gap:8px;margin:14px 0 22px}.warning{background:var(--amber2);color:#604812;border:1px solid #edd9a8;border-radius:12px;padding:10px 13px;font-size:13px}
    .metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.metric,.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.metric{padding:17px;min-width:0;overflow:hidden}.metric .label{font-size:12px;color:var(--muted);font-weight:700}.metric .value{font-size:clamp(24px,3vw,36px);font-weight:850;letter-spacing:-.04em;margin:7px 0 3px;font-variant-numeric:tabular-nums;white-space:nowrap}.metric .sub{font-size:12px;color:var(--muted);overflow-wrap:anywhere}.pos{color:var(--green)}.neg{color:var(--red)}
    .section-title{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin:34px 2px 12px}.section-title h2{font-size:20px;margin:0;flex:none}.section-title span{font-size:12px;color:var(--muted);text-align:right;overflow-wrap:anywhere}.grid2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,.65fr);gap:12px}.panel{padding:18px;min-width:0}.panel h3{font-size:15px;margin:0 0 14px}.progress{height:10px;background:#edf0ed;border-radius:999px;overflow:hidden;margin:12px 0}.progress>i{display:block;height:100%;background:var(--green);border-radius:inherit}.statline{display:flex;justify-content:space-between;gap:16px;font-size:13px}.statline b{font-size:18px}.barlist{display:grid;gap:10px}.barrow{display:grid;grid-template-columns:82px minmax(0,1fr) 76px;gap:8px;align-items:center;font-size:12px}.bar{height:8px;background:#edf0ed;border-radius:10px;overflow:hidden}.bar i{display:block;height:100%;background:var(--blue)}
    .table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th{text-align:left;color:var(--muted);font-size:11px;letter-spacing:.06em;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}td{padding:11px 10px;border-bottom:1px solid #edf0ed;vertical-align:top}tr:last-child td{border:0}.money{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:800}.pill.ok{color:var(--green);background:var(--green2)}.pill.watch{color:var(--amber);background:var(--amber2)}.pill.stop,.pill.missing{color:var(--red);background:var(--red2)}
    .video-list{display:grid;gap:10px}.video{border:1px solid var(--line);border-radius:14px;padding:14px}.video-head{display:flex;justify-content:space-between;gap:12px}.video-title{font-weight:800}.video-date{font-size:12px;color:var(--muted);white-space:nowrap}.checks{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:12px}.check{display:flex;gap:6px;align-items:flex-start;font-size:11px;color:var(--muted);background:#f7f9f7;border-radius:8px;padding:7px}.check input{accent-color:var(--green);margin:2px 0}.check.next{outline:1px solid #e4c66e;background:#fff9e8;color:#624d16}.readonly{font-size:11px;color:var(--muted);margin-top:10px}
    .job-tiles{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.job-tile{border:1px solid var(--line);border-radius:15px;background:var(--card);padding:15px;text-align:left;cursor:pointer;min-width:0}.job-tile:hover,.job-tile.active{border-color:var(--green);box-shadow:0 0 0 2px var(--green2)}.job-tile .n{font-size:30px;font-weight:850}.job-list{margin-top:10px}.job{padding:11px 2px;border-bottom:1px solid var(--line);overflow-wrap:anywhere}.job:last-child{border:0}.job b{display:block;font-size:13px}.job small{display:block;color:var(--muted);margin-top:2px}.empty{padding:22px;text-align:center;color:var(--muted);font-size:13px}.error{max-width:720px;margin:60px auto;background:var(--red2);color:var(--red);padding:20px;border-radius:16px}
    @media(max-width:820px){.metrics{grid-template-columns:repeat(2,minmax(0,1fr))}.grid2{grid-template-columns:minmax(0,1fr)}.checks{grid-template-columns:1fr 1fr}.job-tiles{grid-template-columns:repeat(2,minmax(0,1fr))}}
    @media(max-width:520px){.shell{padding:20px 14px 60px}.top{align-items:flex-start;flex-direction:column}.asof{text-align:left}.metrics{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.metric{padding:14px}.metric .value{font-size:24px}.section-title{margin-top:28px;align-items:flex-start;flex-direction:column;gap:2px}.section-title span{text-align:left}.checks{grid-template-columns:1fr}.video-head{flex-direction:column}.barrow{grid-template-columns:70px minmax(0,1fr) 65px}.job-tiles{gap:8px}.job-tile{padding:12px}}
  </style>
</head>
<body><main class="shell" id="app"><div class="empty">Second Brainを集計しています…</div></main>
<script>
const yen=n=>new Intl.NumberFormat('ja-JP',{style:'currency',currency:'JPY',maximumFractionDigits:0}).format(n||0);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pct=n=>n==null?'—':`${n}%`;
const cls=n=>n>=0?'pos':'neg';
const statusClass=s=>s==='確定'?'ok':s==='暫定'?'watch':'missing';
function metric(label,value,sub,kind=''){return `<article class="metric"><div class="label">${label}</div><div class="value ${kind}">${value}</div><div class="sub">${sub}</div></article>`}
function render(d){
 const maxDaily=Math.max(1,...d.daily.map(x=>Math.max(x.budget,x.delivery)));
 const expenses=d.finance.expense_categories.length?d.finance.expense_categories.map(x=>`<div class="barrow"><span>${esc(x.name)}</span><div class="bar"><i style="width:${Math.round(x.amount/Math.max(1,d.finance.expenses)*100)}%"></i></div><b class="money">${yen(x.amount)}</b></div>`).join(''):`<div class="empty">今月分として反映された経費項目はありません</div>`;
 const videos=d.youtube.schedule.length?d.youtube.schedule.map(v=>`<article class="video"><div class="video-head"><div><div class="video-title">${esc(v.title)}</div><small>${v.folder?'制作フォルダ確認済み':'制作フォルダを一意に特定できません'}</small></div><div class="video-date">${v.date.replaceAll('-','/')} 投稿予定<br>予測 ${Number(v.predicted_views).toLocaleString()}回</div></div><div class="checks">${v.stages.map(s=>`<label class="check ${s.next?'next':''}"><input type="checkbox" ${s.done?'checked':''} disabled><span>${esc(s.name)}${s.next?' ← 次':''}</span></label>`).join('')}</div><div class="readonly">Phase 1は表示専用です（${v.completed}/${v.total_stages}工程完了）</div></article>`).join(''):`<div class="empty">今週の投稿予定がありません</div>`;
 const dailyRows=d.daily.slice(-10).reverse().map(x=>`<tr><td>${x.date.slice(5).replace('-','/')}</td><td class="money">${yen(x.budget)}</td><td class="money">${yen(x.delivery)}</td><td class="money ${cls(x.difference)}">${x.difference>=0?'+':''}${yen(x.difference)}</td><td><span class="pill ${statusClass(x.status)}">${x.status}</span></td></tr>`).join('');
 document.querySelector('#app').innerHTML=`
 <header class="top"><div><div class="eyebrow">Yuma OS / Business Pulse</div><h1>経営ダッシュボード</h1><div>昨日までの数字で、今日の判断をする。</div></div><div class="asof">集計基準 ${d.cutoff}<br>生成 ${d.generated_at.replace('T',' ')}</div></header>
 <section class="warnings">${d.warnings.map(w=>`<div class="warning">⚠ ${esc(w)}</div>`).join('')}</section>
 <section class="metrics">
 ${metric('配達売上',yen(d.delivery.actual),`計画累計 ${yen(d.delivery.budget_to_date)}｜${pct(d.delivery.achievement)}`)}
 ${metric('予算との差',`${d.delivery.difference>=0?'+':''}${yen(d.delivery.difference)}`,`月間目標 ${yen(d.delivery.target)}`,cls(d.delivery.difference))}
 ${metric('YouTube収益',yen(d.youtube.actual),`${d.youtube.captured_days}/${d.youtube.expected_days}日分｜目標 ${yen(d.youtube.target)}`)}
 ${metric('月間利益（暫定）',yen(d.finance.profit),`売上 ${yen(d.finance.revenue)} − 経費 ${yen(d.finance.expenses)}`,cls(d.finance.profit))}
 </section>
 <div class="section-title"><h2>今月の収支</h2><span>経費はfreee ${d.finance.expense_as_of||'未取得'} 時点</span></div>
 <section class="grid2"><article class="panel"><h3>配達の進捗</h3><div class="statline"><span>昨日まで</span><b>${pct(d.delivery.achievement)}</b></div><div class="progress"><i style="width:${Math.min(100,d.delivery.achievement||0)}%"></i></div><div class="table-wrap"><table><thead><tr><th>日</th><th class="money">予算</th><th class="money">実績</th><th class="money">差</th><th>状態</th></tr></thead><tbody>${dailyRows}</tbody></table></div></article><article class="panel"><h3>経費項目</h3><div class="barlist">${expenses}</div><div class="readonly">${esc(d.finance.expense_status)}・未同期取引は含みません</div></article></section>
 <div class="section-title"><h2>YouTube運営</h2><span>今週の投稿と制作工程</span></div><section class="video-list">${videos}</section>
 <div class="section-title"><h2>AIシステム</h2><span>数字を押すと内訳を表示</span></div>
 <section class="job-tiles"><button class="job-tile active" data-group="running"><span class="pill ok">稼働中</span><div class="n">${d.jobs.counts.running}</div></button><button class="job-tile" data-group="watch"><span class="pill watch">様子見</span><div class="n">${d.jobs.counts.watch}</div></button><button class="job-tile" data-group="stopped"><span class="pill stop">停止中</span><div class="n">${d.jobs.counts.stopped}</div></button><button class="job-tile" data-group="all"><span class="pill">合計</span><div class="n">${Object.values(d.jobs.counts).reduce((a,b)=>a+b,0)}</div></button></section><section class="panel job-list" id="jobs"></section>`;
 const showJobs=group=>{const labels={running:'稼働中',watch:'様子見',stopped:'停止中'};let rows=group==='all'?Object.entries(d.jobs.groups).flatMap(([g,x])=>x.map(j=>({...j,g}))):d.jobs.groups[group].map(j=>({...j,g:group}));document.querySelector('#jobs').innerHTML=rows.map(j=>`<div class="job"><b><span class="pill ${j.g==='running'?'ok':j.g==='watch'?'watch':'stop'}">${labels[j.g]}</span> ${esc(j.name)}</b><small>${esc(j.schedule)}｜${esc(j.state)}</small><small>${esc(j.detail)}</small></div>`).join('')};
 showJobs('running');document.querySelectorAll('.job-tile').forEach(b=>b.onclick=()=>{document.querySelectorAll('.job-tile').forEach(x=>x.classList.remove('active'));b.classList.add('active');showJobs(b.dataset.group)});
}
fetch('/api/dashboard',{cache:'no-store'}).then(r=>r.json()).then(d=>{if(d.error)throw Error(d.error);render(d)}).catch(e=>document.querySelector('#app').innerHTML=`<div class="error"><b>集計を表示できません</b><br>${esc(e.message)}<br><small>数字を0円として表示せず停止しました。</small></div>`);
</script></body></html>
