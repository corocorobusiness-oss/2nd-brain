          - heading "サービス内容" [level=2] [ref=e348]
          - generic [ref=e350]: 四柱推命とホロスコープの視点から、自己理解のためのPDF鑑定書を作成します。 生まれ持った性質、強み、疲れやすい場面、恋愛、仕事、人間関係の傾向を、読み返せる鑑定書として整理します。 私は会社経営・人事の現場で、4000人以上と向き合ってきました。占いの読み取りに、人を見てきた現実的な視点も重ねることで、「当たった」で終わらない、日常で使いやすい自己理解に落とし込みます。 【鑑定内容】 ・あなたの本質と基本性格 ・強み、才能、伸びやすい環境 ・苦手になりやすい状況 ・恋愛で出やすい傾向 ・仕事、適職、働き方のヒント ・人間関係で気をつけたいこと ・今の悩みに対する整理 ・次に取りやすい行動 【納品形式】 ・PDF 10-12ページ目安 ・6000-8000字前後 ・24-48時間目安 ・鑑定範囲内の確認1往復まで 公開初期のため、先着10名様まで500円で受付します。 未来を決めつける鑑定ではなく、自分の傾向を知り、選択肢を整理するための鑑定書です。
          - heading "購入にあたってのお願い" [level=2] [ref=e352]
          - generic [ref=e354]: "ご購入後、次の内容をお送りください。 1. ニックネーム 2. 生年月日（西暦） 3. 出生時間（不明なら不明） 4. 出生地（都道府県） 5. 性別（任意） 6. 知りたいテーマを1つ 7. 現在の悩みや状況 8. 表現の希望: やさしめ / 率直 / 具体策多め 出生時間が不明でも作成できますが、一部の読み取りは参考情報として扱います。 医療、法律、投資、合否、生死に関する鑑定、第三者を傷つける内容、効果保証は対応できません。"
