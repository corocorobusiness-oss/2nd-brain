          - generic [ref=e343]: 自分の強みがわからない、同じ悩みを繰り返す、恋愛や仕事で自分のパターンを知りたい方へ。 四柱推命、ホロスコープ、数秘術などの視点を重ねて、あなた専用の「取扱説明書PDF」を作成します。 私は会社経営・人事の現場で4000人以上と向き合い、人が迷いやすい場面、疲れやすい関係、力を出しやすい環境を見てきました。その視点も踏まえ、占い結果を日常で使いやすい言葉に整理します。 【鑑定内容】 ・3分でわかるあなたの要約 ・基本性格と本質 ・強み、才能、伸ばし方 ・苦手パターン、疲れやすい場面 ・恋愛傾向 ・人間関係の取扱説明 ・仕事、適職、働き方 ・お金との向き合い方 ・今後の運気テーマ ・12ヶ月の行動ヒント ・悩み別アドバイス1件 ・30日アクションプラン ・読み返し用まとめ 【納品形式】 ・PDF 25-35ページ目安 ・12000-18000字前後 ・納期3日 ・鑑定範囲内の確認1往復まで 公開初期のため、先着10名様まで500円で受付します。 未来を断定するものではなく、自分の傾向を知り、選択肢と行動を整理するための大容量鑑定書です。
